<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up-Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
    <div class="left-side">
        <img src="background.jpg" class="left-side-img" alt="Photo by Mohamed Nohassi on Unsplash">
        <div class="credit">Photo by Mohamed Nohassi on Unsplash</div>
        <div class="odin-banner">
        <span class="odin-background">
            <p><img src="odin-logo.webp" class="odin-logo" alt="The Odin Project logo">
            Sign-up Form Project</p>
        </span>
            </div>
    </div>
    <div class="right-side">
        <div class="top-right"> 
            <p>This is not a real online service! You know you 
            need something like this in your life, but this is just a demo for 
            this project.<br><br>This is the end of the text up here.</p>   
        </div>
        <div class="middle-right">
            <div class="middle-right-text">
                <p>Let's do this!</p>
            </div>
            <form id="sign-up">
                <input type="text" name="first_name" placeholder="First Name">
                <input type="text" name="last_name" placeholder="Last Name">
                <input type="email" name="email" placeholder="Email">
                <input type="number" name="phone" placeholder="Phone Number">
                <input type="password" name="password" placeholder="Password">
                <input type="password" name="confirm-password" placeholder="Confirm Password">
            </form>
        </div>
        <div class="bottom-right">
        <button class="create-account" button type="submit" form="sign-up">Create Account</button>
        <p>Already have an account? <a href="https://theodinproject.com">Log in</a></p>
        </div>
    </div>
    </div>
</body>
</html>
