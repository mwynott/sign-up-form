<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up-Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="left-side"><!--Left side large image container. Change src to actual image.--><img src="background.jpg" alt="Background Image">
        <div class="odin-background"><!--Odin project background within big image-->Logo with Odin here</div>
    </div>
    <div class="right-side">
        <div class="top-right"><!--Top right text container--> "This is not a real online service...</div>
        <div class="middle-right">"Let's do this!"
            <form group="sign-up">
                <input type="text" name="first_name" placeholder="First Name">
                <input type="text" name="last_name" placeholder="Last Name">
                <input type="email" name="email" placeholder="Email">
                <input type="password" name="password" placeholder="Password"
                <input type="password" name="confirm-password" placeholder="Confirm Password">
            </form>
        </div>
        <div class="bottom-right"><!--Bottom right container with sign up button-->Sign up button here</div>
        <button type="submit" form="sign-up">Create Account</button>
        Already have an account? <a href="#">Log in</a>
    </div>
</body>
</html>
