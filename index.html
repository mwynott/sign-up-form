<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up-Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="left-side">
        <img src="background.jpg" class="left-side-img" alt="Photo by <a href="https://unsplash.com/@coopery?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">
        <div class="odin-background">Logo with Odin here</div>
    </div>
    <div class="right-side">
        <div class="top-right"> "This is not a real online service...</div>
        <div class="middle-right">"Let's do this!"
            <form group="sign-up">
                <input type="text" name="first_name" placeholder="First Name">
                <input type="text" name="last_name" placeholder="Last Name">
                <input type="email" name="email" placeholder="Email">
                <input type="password" name="password" placeholder="Password"
                <input type="password" name="confirm-password" placeholder="Confirm Password">
            </form>
        </div>
        <div class="bottom-right">
        <button type="submit" form="sign-up">Create Account</button>
        Already have an account? <a href="#">Log in</a>
        </div>
    </div>
</body>
</html>
